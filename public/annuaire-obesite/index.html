<!DOCTYPE html>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>

        extend: {

            primary: '#6B5B8E',

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: 'Inter', Arial, sans-serif; }
    :focus-visible { outline: 3px solid #6B5B8E; outline-offset: 2px; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/" class="flex items-center gap-2 text-sm text-gray-500 hover:text-primary transition-colors font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          Retour au site
        </a>
        <span class="text-gray-200">|</span>
        <div>
          <p class="font-bold text-primary text-sm tracking-wide uppercase">CPTS</p>
          <p class="text-xs text-gray-500 font-medium">Porte de France Moselle</p>
        </div>
      </div>
      <span class="inline-block text-primary text-xs font-semibold tracking-widest uppercase border border-primary rounded-full px-4 py-1">
        Répertoire obésité
      </span>
    </div>
  </header>

  <!-- Hero -->
  <section class="bg-white border-b border-gray-100 py-12 px-6">
    <div class="max-w-6xl mx-auto text-center">
      <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-3">Répertoire Obésité</h1>
      <p class="text-gray-500 text-sm max-w-xl mx-auto">
        Professionnels et structures spécialisés dans la prise en charge de l'obésité sur le territoire Porte de France Moselle.
      </p>
    </div>
  </section>

  <main class="max-w-6xl mx-auto px-6 py-8">

    <!-- Onglets -->
    <div class="flex justify-center mb-8 gap-3">
      <button id="btnEtp"
        class="px-5 py-2 rounded-full border-2 border-primary font-medium text-sm transition bg-primary text-white focus:outline-none">
        Éducation thérapeutique du patient
      </button>
      <button id="btnPros"
        class="px-5 py-2 rounded-full border-2 border-primary font-medium text-sm transition text-primary bg-primaryLight hover:bg-primaryLight/70 focus:outline-none">
        Professionnels de santé
      </button>
    </div>

    <!-- Sections -->
    <div id="etpSection" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <div id="prosSection" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>

  <!-- Modal -->
  <div id="cardModal" class="fixed inset-0 hidden items-center justify-center bg-black/40 z-50 px-4" aria-modal="true" role="dialog">
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-lg p-8 overflow-y-auto max-h-[90vh]">
      <button id="closeCardModal" class="absolute top-4 right-4 text-gray-400 hover:text-primary text-2xl leading-none" aria-label="Fermer">&times;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <footer class="border-t border-gray-100 py-8 mt-12">
    <p class="text-center text-xs text-gray-400">© 2026 CPTS Porte de France Moselle</p>
  </footer>

  <script>

      },
      {

        public: 'Adultes',

        lieux: 'CHR Metz‑Thionville (Hôpital Bel Air, Thionville)',

      },

    const prosData = [

      },

      },
      {

      },
      {

      {

      },
      {

        address: '26 Rue Houillère, 57800 Freyming‑Merlebach',
        contact: '06 33 12 50 84 / Doctolib',
        notes: 'RDV en ligne'
      },
      {

        nom: 'Sofia Tomaz',
        speciality: 'Diététicienne (Perte de poids, diabète…)',

      },
      {

        notes: 'Structure coordonnée'
      }
    ];

    function renderEtp() {
      const container = document.getElementById('etpSection');
      container.innerHTML = '';
      etpData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow cursor-pointer';
        card.innerHTML = `
          <h3 class="font-bold text-gray-900 mb-1 leading-snug">${item.programme}</h3>
          <span class="inline-block text-xs font-semibold text-primary bg-primaryLight px-2 py-0.5 rounded-full mb-3">${item.public}</span>
          <p class="text-xs text-gray-500 mb-1"><span class="font-medium text-gray-700">Structure :</span> ${item.structure}</p>
          <p class="text-xs text-gray-500"><span class="font-medium text-gray-700">Lieu :</span> ${item.lieux}</p>
        `;
        card.addEventListener('click', () => openModal(item, 'etp'));
        container.appendChild(card);
      });
    }

    function renderPros() {
      const container = document.getElementById('prosSection');
      container.innerHTML = '';
      prosData.forEach(item => {
        const card = document.createElement('div');
        card.className = 'bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow cursor-pointer';
        card.innerHTML = `
          <h3 class="font-bold text-gray-900 mb-1 leading-snug">${item.nom}</h3>
          <span class="inline-block text-xs font-semibold text-primary bg-primaryLight px-2 py-0.5 rounded-full mb-3">${item.category}</span>
          <p class="text-xs text-gray-500 mb-1"><span class="font-medium text-gray-700">Spécialité :</span> ${item.speciality}</p>
          <p class="text-xs text-gray-500"><span class="font-medium text-gray-700">Adresse :</span> ${item.address}</p>
        `;
        card.addEventListener('click', () => openModal(item, 'pros'));
        container.appendChild(card);
      });
    }

    function showSection(type) {
      const etpBtn = document.getElementById('btnEtp');
      const prosBtn = document.getElementById('btnPros');
      const etpSec = document.getElementById('etpSection');
      const prosSec = document.getElementById('prosSection');

      if (type === 'etp') {
        etpSec.classList.remove('hidden');
        prosSec.classList.add('hidden');
        etpBtn.className = 'px-5 py-2 rounded-full border-2 border-primary font-medium text-sm transition bg-primary text-white focus:outline-none';
        prosBtn.className = 'px-5 py-2 rounded-full border-2 border-primary font-medium text-sm transition text-primary bg-primaryLight hover:bg-primaryLight/70 focus:outline-none';
      } else {
        prosSec.classList.remove('hidden');
        etpSec.classList.add('hidden');
        prosBtn.className = 'px-5 py-2 rounded-full border-2 border-primary font-medium text-sm transition bg-primary text-white focus:outline-none';
        etpBtn.className = 'px-5 py-2 rounded-full border-2 border-primary font-medium text-sm transition text-primary bg-primaryLight hover:bg-primaryLight/70 focus:outline-none';
      }
    }

    function openModal(item, type) {
      const modal = document.getElementById('cardModal');
      const content = document.getElementById('modalContent');

      if (type === 'etp') {
        content.innerHTML = `
          <h2 class="text-xl font-bold text-gray-900 mb-1">${item.programme}</h2>
          <span class="inline-block text-xs font-semibold text-primary bg-primaryLight px-2 py-0.5 rounded-full mb-4">${item.public}</span>
          <div class="space-y-2 text-sm text-gray-600">
            <p><span class="font-semibold text-gray-800">Structure :</span> ${item.structure}</p>
            <p><span class="font-semibold text-gray-800">Lieu(x) :</span> ${item.lieux}</p>
            <p><span class="font-semibold text-gray-800">Contact :</span> ${item.contact}</p>
            <p><span class="font-semibold text-gray-800">Focus :</span> ${item.focus}</p>
            <p><span class="font-semibold text-gray-800">Statut / Notes :</span> ${item.notes}</p>
          </div>
        `;
      } else {
        content.innerHTML = `
          <h2 class="text-xl font-bold text-gray-900 mb-1">${item.nom}</h2>
          <span class="inline-block text-xs font-semibold text-primary bg-primaryLight px-2 py-0.5 rounded-full mb-4">${item.category}</span>
          <div class="space-y-2 text-sm text-gray-600">
            <p><span class="font-semibold text-gray-800">Spécialité :</span> ${item.speciality}</p>
            <p><span class="font-semibold text-gray-800">Adresse :</span> ${item.address}</p>
            <p><span class="font-semibold text-gray-800">Contact :</span> ${item.contact}</p>
            ${item.notes ? `<p><span class="font-semibold text-gray-800">Notes :</span> ${item.notes}</p>` : ''}
          </div>
        `;
      }

      modal.classList.remove('hidden');
      modal.classList.add('flex');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      const modal = document.getElementById('cardModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.body.style.overflow = '';
    }

    document.getElementById('closeCardModal').addEventListener('click', closeModal);
    document.getElementById('cardModal').addEventListener('click', e => {
      if (e.target.id === 'cardModal') closeModal();
    });
    document.getElementById('btnEtp').addEventListener('click', () => showSection('etp'));
    document.getElementById('btnPros').addEventListener('click', () => showSection('pros'));

    renderEtp();
    renderPros();
    showSection('etp');
  </script>
</body>
</html>
